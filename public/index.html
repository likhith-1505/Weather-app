<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather DevOps App</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1d4ed8;
      --card-bg: rgba(255, 255, 255, 0.15);
      --card-border: rgba(255, 255, 255, 0.25);
      --text-main: #f8fafc;
      --text-soft: #cbd5e1;
      --accent: #fbbf24;
      --ok: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 50px rgba(2, 6, 23, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 1.25rem;
      background: linear-gradient(140deg, var(--bg-1), var(--bg-2) 60%, #0ea5e9);
      color: var(--text-main);
      display: grid;
      place-items: center;
    }

    .dashboard {
      width: min(920px, 100%);
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top {
      padding: 1.2rem 1.2rem 0.8rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 0.35rem 0 0;
      color: var(--text-soft);
      font-size: 0.95rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    input {
      flex: 1;
      padding: 0.75rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text-main);
      background: rgba(15, 23, 42, 0.45);
      outline: none;
    }

    input::placeholder {
      color: #b3c0d6;
    }

    input:focus {
      border-color: #f8fafc;
    }

    button {
      padding: 0.75rem 1rem;
      border: none;
      background: linear-gradient(120deg, #f59e0b, #fbbf24);
      color: #1f2937;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.2);
      transform: none;
    }

    .status {
      margin-top: 0.8rem;
      min-height: 1.25rem;
      font-size: 0.92rem;
      color: var(--text-soft);
    }

    .status.ok {
      color: #dcfce7;
    }

    .status.error {
      color: #fee2e2;
    }

    .card {
      margin: 0.8rem 1.2rem 1.2rem;
      border-radius: 16px;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .main-weather {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .location {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }

    .updated {
      color: var(--text-soft);
      margin: 0.3rem 0 0;
      font-size: 0.88rem;
    }

    .temp {
      font-size: clamp(2.1rem, 5vw, 3.8rem);
      line-height: 1;
      margin: 0.6rem 0 0;
      font-weight: 700;
    }

    .condition {
      font-size: 1rem;
      margin: 0.35rem 0 0;
      color: #fef3c7;
    }

    .icon {
      font-size: clamp(2rem, 5vw, 3rem);
      text-align: right;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .metric {
      background: rgba(148, 163, 184, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      padding: 0.75rem;
    }

    .metric .label {
      margin: 0;
      color: #dbeafe;
      font-size: 0.85rem;
    }

    .metric .value {
      margin: 0.25rem 0 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: #f8fafc;
    }

    @media (max-width: 640px) {
      .search-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .icon {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <section class="dashboard">
    <div class="top">
      <h1>Weather DevOps App Running</h1>
      <p class="subtitle">Live-style weather dashboard powered by demo-safe backend data.</p>

      <div class="search-row">
        <input id="cityInput" type="text" placeholder="Enter city, e.g. Bangalore" />
        <button id="fetchBtn" type="button">Get Weather</button>
      </div>

      <p id="statusMsg" class="status">Type a city and click Get Weather.</p>
    </div>

    <article class="card">
      <div class="main-weather">
        <div>
          <p id="cityLabel" class="location">Bangalore, IN</p>
          <p id="updatedAt" class="updated">Updated: --</p>
          <p id="temperature" class="temp">--</p>
          <p id="condition" class="condition">Condition: --</p>
        </div>
        <div id="icon" class="icon" aria-label="Weather icon">☀️</div>
      </div>

      <div class="metrics">
        <div class="metric">
          <p class="label">Feels Like</p>
          <p id="feelsLike" class="value">--</p>
        </div>
        <div class="metric">
          <p class="label">Humidity</p>
          <p id="humidity" class="value">--</p>
        </div>
        <div class="metric">
          <p class="label">Wind Speed</p>
          <p id="windSpeed" class="value">--</p>
        </div>
        <div class="metric">
          <p class="label">Pressure</p>
          <p id="pressure" class="value">--</p>
        </div>
        <div class="metric">
          <p class="label">Visibility</p>
          <p id="visibility" class="value">--</p>
        </div>
      </div>
    </article>
  </section>

  <script>
    const cityInput = document.getElementById('cityInput');
    const fetchBtn = document.getElementById('fetchBtn');
    const statusMsg = document.getElementById('statusMsg');
    const cityLabel = document.getElementById('cityLabel');
    const updatedAt = document.getElementById('updatedAt');
    const temperature = document.getElementById('temperature');
    const condition = document.getElementById('condition');
    const icon = document.getElementById('icon');
    const feelsLike = document.getElementById('feelsLike');
    const humidity = document.getElementById('humidity');
    const windSpeed = document.getElementById('windSpeed');
    const pressure = document.getElementById('pressure');
    const visibility = document.getElementById('visibility');

    function getWeatherIcon(currentCondition) {
      const value = String(currentCondition || '').toLowerCase();

      if (value.includes('rain')) return '🌧️';
      if (value.includes('cloud')) return '☁️';
      if (value.includes('storm')) return '⛈️';
      if (value.includes('snow')) return '❄️';
      if (value.includes('fog') || value.includes('mist')) return '🌫️';
      return '☀️';
    }

    function renderWeather(data) {
      cityLabel.textContent = `${data.city}, ${data.country}`;
      updatedAt.textContent = `Updated: ${new Date(data.updatedAt).toLocaleString()}`;
      temperature.textContent = data.temperature;
      condition.textContent = `Condition: ${data.condition}`;
      icon.textContent = getWeatherIcon(data.condition);
      feelsLike.textContent = data.feelsLike;
      humidity.textContent = data.humidity;
      windSpeed.textContent = data.windSpeed;
      pressure.textContent = data.pressure;
      visibility.textContent = data.visibility;
    }

    function setLoadingState(isLoading) {
      fetchBtn.disabled = isLoading;
      fetchBtn.textContent = isLoading ? 'Loading...' : 'Get Weather';
    }

    async function fetchWeather() {
      const city = cityInput.value.trim() || 'Bangalore';
      setLoadingState(true);
      statusMsg.className = 'status';
      statusMsg.textContent = `Fetching weather for ${city}...`;

      try {
        const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`, {
          method: 'GET',
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        renderWeather(data);
        statusMsg.className = 'status ok';
        statusMsg.textContent = `Weather updated successfully for ${data.city}.`;
      } catch (error) {
        console.error('Weather API request failed:', error);
        statusMsg.className = 'status error';
        statusMsg.textContent = 'Failed to fetch weather data. Please check that the backend is running on port 3000.';
      } finally {
        setLoadingState(false);
      }
    }

    fetchBtn.addEventListener('click', fetchWeather);
    cityInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        fetchWeather();
      }
    });

    fetchWeather();
  </script>
</body>
</html>
