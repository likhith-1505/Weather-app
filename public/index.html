<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherHub - Real-Time Weather Dashboard</title>
  <style>
    :root {
      --primary: #1e40af;
      --primary-dark: #1e3a8a;
      --secondary: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f97316;
      --text-light: #f8fafc;
      --text-dark: #1e293b;
      --bg-light: #f1f5f9;
      --bg-light-card: #ffffff;
      --bg-dark: #0f172a;
      --bg-dark-card: #1e293b;
      --border-light: #e2e8f0;
      --border-dark: #334155;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      --shadow-dark: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html.light-mode {
      color-scheme: light;
    }

    html.dark-mode {
      color-scheme: dark;
    }

    body.light-mode {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: var(--text-dark);
    }

    body.dark-mode {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: var(--text-light);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    .light-mode .navbar {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text-dark);
      border-bottom: 1px solid var(--border-light);
    }

    .dark-mode .navbar {
      background: rgba(30, 41, 59, 0.95);
      color: var(--text-light);
      border-bottom: 1px solid var(--border-dark);
    }

    .navbar {
      backdrop-filter: blur(10px);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .navbar-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      padding: 0.25rem;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .theme-toggle:hover {
      opacity: 1;
    }

    .container {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .search-section {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .light-mode .search-box {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border-light);
    }

    .dark-mode .search-box {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid var(--border-dark);
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      font-size: 1rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .light-mode .search-box {
      color: var(--text-dark);
    }

    .dark-mode .search-box {
      color: var(--text-light);
    }

    .search-box::placeholder {
      opacity: 0.5;
    }

    .search-box:focus {
      outline: none;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: inherit;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .search-history {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .light-mode .history-tag {
      background: rgba(255, 255, 255, 0.8);
      color: var(--text-dark);
      border: 1px solid var(--border-light);
    }

    .dark-mode .history-tag {
      background: rgba(30, 41, 59, 0.8);
      color: var(--text-light);
      border: 1px solid var(--border-dark);
    }

    .history-tag {
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .history-tag:hover {
      transform: scale(1.05);
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
    }

    .light-mode .card {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text-dark);
      border: 1px solid var(--border-light);
    }

    .dark-mode .card {
      background: rgba(30, 41, 59, 0.95);
      color: var(--text-light);
      border: 1px solid var(--border-dark);
    }

    .card {
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .current-weather {
      grid-column: 1 / -1;
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .weather-icon-large {
      font-size: 4rem;
      opacity: 0.8;
    }

    .location-info h2 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .location-info p {
      margin: 0.25rem 0 0;
      opacity: 0.7;
      font-size: 0.95rem;
    }

    .temp-display {
      margin: 1rem 0;
    }

    .current-temp {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .condition-text {
      font-size: 1.25rem;
      margin-top: 0.5rem;
      opacity: 0.8;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .light-mode .detail-item {
      background: rgba(0, 0, 0, 0.02);
    }

    .dark-mode .detail-item {
      background: rgba(255, 255, 255, 0.05);
    }

    .detail-item {
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
    }

    .detail-label {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }

    .detail-value {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .forecast-section h3 {
      margin: 0 0 1rem;
      font-size: 1.25rem;
    }

    .forecast-container {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scroll-behavior: smooth;
    }

    .forecast-container::-webkit-scrollbar {
      height: 4px;
    }

    .light-mode .forecast-container::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }

    .dark-mode .forecast-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }

    .forecast-container::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .light-mode .forecast-card {
      background: rgba(0, 0, 0, 0.02);
      border: 1px solid var(--border-light);
    }

    .dark-mode .forecast-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-dark);
    }

    .forecast-card {
      min-width: 120px;
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .forecast-card:hover {
      transform: translateY(-3px);
    }

    .forecast-day {
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .forecast-icon {
      font-size: 2rem;
      margin: 0.5rem 0;
    }

    .forecast-temp {
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .forecast-condition {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.5rem;
    }

    .light-mode .footer {
      background: rgba(255, 255, 255, 0.9);
      color: var(--text-dark);
      border-top: 1px solid var(--border-light);
    }

    .dark-mode .footer {
      background: rgba(30, 41, 59, 0.9);
      color: var(--text-light);
      border-top: 1px solid var(--border-dark);
    }

    .footer {
      padding: 1.5rem;
      text-align: center;
      opacity: 0.7;
      font-size: 0.9rem;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .dark-mode .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid white;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-message {
      background: rgba(239, 68, 68, 0.2);
      color: #fecaca;
      padding: 1rem;
      border-radius: 12px;
      margin: 1rem 0;
      border: 1px solid #dc2626;
    }

    .light-mode .error-message {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .success-message {
      background: rgba(16, 185, 129, 0.2);
      color: #a7f3d0;
      padding: 1rem;
      border-radius: 12px;
      margin: 1rem 0;
      border: 1px solid #059669;
    }

    .light-mode .success-message {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
        gap: 1.5rem;
      }

      .weather-grid {
        grid-template-columns: 1fr;
      }

      .details-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .card {
        padding: 1.5rem;
      }

      .current-temp {
        font-size: 2.5rem;
      }

      .weather-icon-large {
        font-size: 3rem;
      }

      .navbar {
        flex-wrap: wrap;
        gap: 1rem;
      }

      .search-section {
        flex-direction: column;
      }
    }

    @media (max-width: 480px) {
      .details-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .navbar-brand {
        font-size: 1.25rem;
      }

      .current-temp {
        font-size: 2rem;
      }

      .weather-icon-large {
        font-size: 2rem;
      }

      .forecast-container {
        gap: 0.75rem;
      }

      .forecast-card {
        min-width: 100px;
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body class="light-mode">
  <nav class="navbar">
    <div class="navbar-brand">
      ☀️ WeatherHub
    </div>
    <div class="navbar-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        🌙
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="search-section">
      <input
        id="cityInput"
        type="text"
        class="search-box"
        placeholder="Search for a city..."
        aria-label="Search city"
      />
      <button class="btn btn-primary" id="searchBtn">🔍 Search</button>
      <button class="btn btn-secondary" id="refreshBtn">🔄 Refresh</button>
      <button class="btn btn-secondary" id="locationBtn">📍 Current Location</button>
    </div>

    <div id="historyContainer" class="search-history"></div>
    <div id="messageContainer"></div>

    <div id="weatherContent">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>WeatherHub © 2026 | Demo Data | Real-Time Weather Dashboard</p>
  </footer>

  <script>
    // DOM Elements
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const locationBtn = document.getElementById('locationBtn');
    const themeToggle = document.getElementById('themeToggle');
    const weatherContent = document.getElementById('weatherContent');
    const messageContainer = document.getElementById('messageContainer');
    const historyContainer = document.getElementById('historyContainer');

    // State
    let currentCity = 'Bangalore';
    let searchHistory = JSON.parse(localStorage.getItem('weatherHistory')) || [];
    let isDarkMode = localStorage.getItem('darkMode') === 'true';

    // Initialize
    function init() {
      applyTheme();
      renderHistory();
      fetchWeather(currentCity);
    }

    // Theme Management
    function applyTheme() {
      const html = document.documentElement;
      const body = document.body;
      
      if (isDarkMode) {
        html.classList.remove('light-mode');
        html.classList.add('dark-mode');
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        themeToggle.textContent = '☀️';
      } else {
        html.classList.add('light-mode');
        html.classList.remove('dark-mode');
        body.classList.add('light-mode');
        body.classList.remove('dark-mode');
        themeToggle.textContent = '🌙';
      }
    }

    themeToggle.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      localStorage.setItem('darkMode', isDarkMode);
      applyTheme();
    });

    // Message Display
    function showMessage(text, type = 'info') {
      messageContainer.innerHTML = `<div class="${type}-message">${text}</div>`;
      setTimeout(() => {
        messageContainer.innerHTML = '';
      }, 5000);
    }

    // Search History Management
    function addToHistory(city) {
      if (!searchHistory.includes(city)) {
        searchHistory.unshift(city);
        if (searchHistory.length > 8) {
          searchHistory.pop();
        }
        localStorage.setItem('weatherHistory', JSON.stringify(searchHistory));
        renderHistory();
      }
    }

    function renderHistory() {
      if (searchHistory.length === 0) {
        historyContainer.innerHTML = '';
        return;
      }

      historyContainer.innerHTML = '<strong>Recent:</strong> ' + searchHistory
        .map(city => `<span class="history-tag">${city}</span>`)
        .join('');

      document.querySelectorAll('.history-tag').forEach(tag => {
        tag.addEventListener('click', () => {
          fetchWeather(tag.textContent);
        });
      });
    }

    // Weather Icon Mapping
    function getWeatherIcon(condition) {
      const c = String(condition || '').toLowerCase();
      if (c.includes('rain')) return '🌧️';
      if (c.includes('cloud')) return '☁️';
      if (c.includes('storm')) return '⛈️';
      if (c.includes('snow')) return '❄️';
      if (c.includes('wind')) return '💨';
      if (c.includes('fog') || c.includes('mist')) return '🌫️';
      if (c.includes('sunny') || c.includes('clear')) return '☀️';
      return '🌤️';
    }

    // Render Weather
    function renderWeather(data) {
      const mainContent = `
        <div class="card current-weather">
          <div class="weather-header">
            <div class="location-info">
              <h2>${data.city}, ${data.country}</h2>
              <p>Last updated: ${new Date(data.updatedAt).toLocaleString()}</p>
              <div class="temp-display">
                <div class="current-temp">${data.temperature}</div>
                <div class="condition-text">${data.condition}</div>
              </div>
            </div>
            <div class="weather-icon-large">${getWeatherIcon(data.condition)}</div>
          </div>

          <div class="details-grid">
            <div class="detail-item">
              <div class="detail-label">Feels Like</div>
              <div class="detail-value">${data.feelsLike}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Humidity</div>
              <div class="detail-value">${data.humidity}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value">${data.windSpeed}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Pressure</div>
              <div class="detail-value">${data.pressure}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Visibility</div>
              <div class="detail-value">${data.visibility}</div>
            </div>
          </div>
        </div>

        <div class="card forecast-section">
          <h3>5-Day Forecast</h3>
          <div class="forecast-container">
            ${data.forecast.map(day => `
              <div class="forecast-card">
                <div class="forecast-day">${day.day}</div>
                <div class="forecast-icon">${getWeatherIcon(day.condition)}</div>
                <div class="forecast-temp">${day.temp}</div>
                <div class="forecast-condition">${day.condition}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      weatherContent.innerHTML = mainContent;
    }

    // Fetch Weather
    async function fetchWeather(city) {
      if (!city || city.trim() === '') {
        showMessage('Please enter a city name', 'error');
        return;
      }

      weatherContent.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      searchBtn.disabled = true;
      refreshBtn.disabled = true;

      try {
        const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        currentCity = data.city;
        addToHistory(currentCity);
        renderWeather(data);
        showMessage(`Weather updated for ${data.city}`, 'success');
      } catch (error) {
        console.error('Weather fetch error:', error);
        weatherContent.innerHTML = `
          <div class="card">
            <div class="error-message">
              Failed to fetch weather data. Please ensure the backend is running on port 3000.
              <br />Error: ${error.message}
            </div>
          </div>
        `;
        showMessage('Failed to fetch weather data', 'error');
      } finally {
        searchBtn.disabled = false;
        refreshBtn.disabled = false;
      }
    }

    // Event Listeners
    searchBtn.addEventListener('click', () => {
      const city = cityInput.value.trim();
      if (city) {
        fetchWeather(city);
        cityInput.value = '';
      }
    });

    cityInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        searchBtn.click();
      }
    });

    refreshBtn.addEventListener('click', () => {
      fetchWeather(currentCity);
    });

    locationBtn.addEventListener('click', () => {
      if (navigator.geolocation) {
        locationBtn.disabled = true;
        navigator.geolocation.getCurrentPosition(
          (position) => {
            fetchWeather('Bangalore');
            showMessage('Using current location (demo mode)', 'success');
            locationBtn.disabled = false;
          },
          () => {
            fetchWeather('Bangalore');
            showMessage('Location permission denied. Using default location.', 'info');
            locationBtn.disabled = false;
          }
        );
      }
    });

    // Initialize app
    init();
  </script>
</body>
</html>
